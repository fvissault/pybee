<!DOCTYPE html>
<html>
    <body>
        <input id="email">

        <button onclick="reset()">Reset</button>

        <script>
        function reset(){
            fetch("/api/mail.py", {
                method: "POST",
                body: new URLSearchParams({
                    email: email.value
                })
            }).then(()=>alert("Mail envoyé"));
        }
        </script>
    </body>
</html>
