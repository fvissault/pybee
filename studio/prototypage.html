<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title data-i18n="text:title"></title>
    <link rel="stylesheet" href="css/prototypage.css"/>
    <script src="js/lang.js"></script>
    <script defer src="js/prototypage_lang.js"></script>
    <script defer src="js/prototypage_dragdrop.js"></script>
    <script defer src="js/prototypage_dialogs_dispatcher.js"></script>
    <script defer src="js/prototypage_dialogs_properties.js"></script>
    <script defer src="js/prototypage_dialogs_styling.js"></script>
    <script defer src="js/prototypage_dialogs_events.js"></script>

</head>

<body onload="initPrototypage()">
    <!-- Menu -->
    <header class="topbar">
        <div class="topbar-left">
            <img src="images/logo.png" class="logo"/>
            <span class="title" data-i18n="text:proto_header"></span>
            <button id="newPageBtn" data-i18n="text:newworkspace"></button>
            <button id="newComposantBtn" data-i18n="text:newcomposant"></button>
            <button id="savebtn" onclick="saveFileBST()" data-i18n="text:save"></button>
            <span id="workspace_content"></span>
        </div>
    </header>

    <div id="main">
        <!-- Explorateur -->
        <div id="explorer" class="panel">
            <div class="panel-header" data-i18n="text:explorer"></div>
            <div class="panel-content">
                <div id="projectTree"></div>
            </div>
        </div>

        <!-- Palette -->
        <div id="palette" class="panel">
            <div class="panel-header" data-i18n="text:palette"></div>

            <div class="palette_section">
                <div class="palette_header" data-i18n="text:layout"></div>
                <div class="palette-content">
                    <div class="palette-item" draggable="true" data-type="layout" data-zones="1"  data-i18n="title:layout1z">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-layout)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="layout" data-zones="2"  data-i18n="title:layout2z">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="8" height="18" rx="2"/>
                            <rect x="13" y="3" width="8" height="18" rx="2"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-layout)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="layout" data-zones="3"  data-i18n="title:layout3z">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="5" height="18" rx="2"/>
                            <rect x="10" y="3" width="4" height="18" rx="2"/>
                            <rect x="16" y="3" width="5" height="18" rx="2"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-layout)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="layout" data-zones="4"  data-i18n="title:layout4z">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="8" height="8" rx="2"/>
                            <rect x="13" y="3" width="8" height="8" rx="2"/>
                            <rect x="3" y="13" width="8" height="8" rx="2"/>
                            <rect x="13" y="13" width="8" height="8" rx="2"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-layout)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="layout" data-zones="5"  data-i18n="title:layout5z">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="4" rx="2"/>
                            <rect x="3" y="9" width="8" height="5" rx="2"/>
                            <rect x="13" y="9" width="8" height="5" rx="2"/>
                            <rect x="3" y="16" width="8" height="5" rx="2"/>
                            <rect x="13" y="16" width="8" height="5" rx="2"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-layout)" stroke="none"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="palette_section">
                <div class="palette_header" data-i18n="text:containers"></div>
                <div class="palette-content">
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Block" data-i18n="title:block">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="6" y1="8" x2="18" y2="8"/>
                            <line x1="6" y1="12" x2="14" y2="12"/>
                            <line x1="6" y1="16" x2="12" y2="16"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Paragraph" data-i18n="title:paragraph">
                        <svg class="icon" viewBox="0 0 24 24">
                            <line x1="8" y1="6" x2="20" y2="6"/>
                            <line x1="4" y1="10" x2="20" y2="10"/>
                            <line x1="4" y1="14" x2="20" y2="14"/>
                            <line x1="4" y1="18" x2="14" y2="18"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Form" data-i18n="title:form">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="6" y1="7" x2="10" y2="7"/>
                            <rect x="11" y="6" width="7" height="3" rx="1"/>                           
                            <line x1="6" y1="12" x2="10" y2="12"/>
                            <rect x="11" y="11" width="7" height="3" rx="1"/>
                            <rect x="8" y="16" width="8" height="3" rx="1"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Ul" data-i18n="title:ul">
                        <svg class="icon" viewBox="0 0 24 24">
                            <circle cx="6" cy="7" r="1"/>
                            <line x1="10" y1="7" x2="20" y2="7"/>
                            <circle cx="6" cy="12" r="1"/>
                            <line x1="10" y1="12" x2="20" y2="12"/>
                            <circle cx="6" cy="17" r="1"/>
                            <line x1="10" y1="17" x2="20" y2="17"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Ol" data-i18n="title:ol">
                        <svg class="icon" viewBox="0 0 24 24" stroke-linecap="round">
                            <line x1="4" y1="6" x2="4" y2="9"/>
                            <line x1="12" y1="7.5" x2="20" y2="7.5"/>
                            <line x1="4" y1="11" x2="4" y2="14"/>
                            <line x1="6" y1="11" x2="6" y2="14"/>
                            <line x1="12" y1="12.5" x2="20" y2="12.5"/>
                            <line x1="4" y1="16" x2="4" y2="19"/>
                            <line x1="6" y1="16" x2="6" y2="19"/>
                            <line x1="8" y1="16" x2="8" y2="19"/>
                            <line x1="12" y1="17.5" x2="20" y2="17.5"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Li" data-i18n="title:li">
                        <svg class="icon" viewBox="0 0 24 24">
                            <circle cx="6" cy="12" r="1.5"/>
                            <line x1="10" y1="12" x2="20" y2="12"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Header" data-i18n="title:header">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="5" rx="2"/>
                            <rect x="3" y="10" width="18" height="11" rx="2" stroke-dasharray="3 2"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Footer" data-i18n="title:footer">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="11" rx="2" stroke-dasharray="3 2"/>
                            <rect x="3" y="16" width="18" height="5" rx="2"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Article" data-i18n="title:article">
                        <svg class="icon" viewBox="0 0 24 24" stroke-linecap="round">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <rect x="6" y="6" width="4" height="4" rx="1"/>
                            <line x1="13" y1="6" x2="18" y2="6"/>
                            <line x1="13" y1="10" x2="18" y2="10"/>
                            <line x1="6" y1="14" x2="18" y2="14"/>
                            <line x1="6" y1="18" x2="15" y2="18"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Fieldset" data-i18n="title:fieldset">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M3 7h6l2-2h10v14H3z"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-container)" stroke="none"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="palette_section">
                <div class="palette_header" data-i18n="text:simpleobjs"></div>
                <div class="palette-content">
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Text" data-i18n="title:text">
                        <svg class="icon" viewBox="0 0 24 24">
                            <line x1="4" y1="7" x2="20" y2="7"/>
                            <line x1="4" y1="12" x2="16" y2="12"/>
                            <line x1="4" y1="17" x2="12" y2="17"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-text)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Span" data-i18n="title:span">
                        <svg class="icon" viewBox="0 0 24 24">
                            <line x1="4" y1="12" x2="20" y2="12"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-text)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Label" data-i18n="title:label">
                        <svg class="icon" viewBox="0 0 24 24">
                            <line x1="4" y1="8" x2="12" y2="8"/>
                            <line x1="4" y1="12" x2="10" y2="12"/>
                            <circle cx="17" cy="12" r="2"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-text)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="TextField" data-i18n="title:textfield">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="7" width="18" height="10" rx="2"/>
                            <line x1="7" y1="10" x2="7" y2="14"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-form)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Image" data-i18n="title:img">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <circle cx="9" cy="10" r="2"/>
                            <polyline points="3,17 9,13 13,15 21,11"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-text)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Button" data-i18n="title:button">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="8" width="18" height="8" rx="2"/>
                            <line x1="7" y1="12" x2="17" y2="12"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-action)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Anchor" data-i18n="title:anchor">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="5" y="9" width="6" height="6" rx="2"/>
                            <rect x="14" y="9" width="6" height="6" rx="2"/>
                            <line x1="8" y1="12" x2="17" y2="12"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-action)" stroke="none"/>
                        </svg>
                    </div>
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Title" data-i18n="title:htitle">
                        <svg class="icon" viewBox="0 0 24 24">
                            <line x1="4" y1="7" x2="20" y2="7" stroke-width="4"/>
                            <line x1="4" y1="13" x2="20" y2="13" stroke-width="2"/>
                            <line x1="4" y1="18" x2="20" y2="18" stroke-width="1"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-text)" stroke="none"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="palette_section">
                <div class="palette_header" data-i18n="text:complexobjs"></div>
                <div class="palette-content">
                    <div class="palette-item" draggable="true" data-type="widget" data-widget="Text" data-i18n="title:text">
                        <svg class="icon" viewBox="0 0 24 24">
                            <!-- Conteneur -->
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            
                            <!-- Sous-blocs -->
                            <rect x="6" y="6" width="5" height="5" rx="1"/>
                            <rect x="13" y="6" width="5" height="5" rx="1"/>
                            <rect x="9" y="13" width="6" height="5" rx="1"/>
                            <circle cx="20" cy="20" r="3" fill="var(--color-component)" stroke="none"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- workspace -->
        <div id="workspace-panel" class="panel">
            <div class="panel-header">
                <div>
                    <button id="config_container" class="btn btn-secondary" style="font-size:12px;" onclick="openDialog(workspaceRoot, 'html')" data-i18n="title:param">⚙</button> 
                    <button id="css_container" class="btn btn-secondary" style="font-weight:bold;" onclick="openDialog(workspaceRoot, 'css')" data-i18n="title:css">::</button> 
                    <button id="js_container" class="btn btn-secondary" onclick="openIntFlow()" data-i18n="title:internflow">js</button> 
                    <button id="model_container" class="btn btn-secondary" onclick="openDialog(workspaceRoot, 'model')" data-i18n="title:model">M</button> 
                    <span data-i18n="text:workspace"></span>
                </div>
            </div>
            <div class="panel-content">
                <div id="workspace"></div>
            </div>
        </div>

        <!-- poubelle -->
        <div id="trash" data-i18n="text:trash"></div>
    </div>

    <div id="dialogOverlay" class="dialog-overlay hidden">
        <div id="dialog" class="dialog-popup">
            <div id="dialogHeader" class="dialog-header"></div>
            <div id="dialogContent"></div>
        </div>
    </div>
</body>
</html>
