<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Beetle studio main</title>
        <script>
            async function initMain(){
                // 1. Récupération session
                const res = await fetch("/pybee/studio/api/session.py", {
                    method: "POST",
                    credentials: "include",
                    body: new URLSearchParams({ action: "read" })
                });
                const session = await res.json();
                // 2. Vérification
                if(!session || !session.auth){
                    location.href = "signin.html";
                    return;
                }
                const now = Math.floor(Date.now() / 1000);
                if(!session.exp || session.exp < now){
                    location.href = "signin.html";
                    return;
                }
                // 3. Maintenant seulement → appel projets
                const res2 = await fetch("/pybee/studio/api/projects_users.py", {
                    method: "POST",
                    credentials: "include",
                    body: new URLSearchParams({
                        action: "list",
                        userid: session.userid
                    })
                });
                const projects = await res2.json();
                console.log(projects)
                // 4. Affichage
                let html = "";
                projects.forEach(p => {
                    html += `<div>${p.name}</div>`;
                });
                document.getElementById("projects").innerHTML = html;
            }

            function disconnect() {
                fetch("/pybee/studio/api/session.py", {
                    method: "POST",
                    credentials: "include",
                    body: JSON.stringify({ action: "destroy" })
                })
                .then(() => location.href = "signin.html");
            }
        </script>
    </head>
    <body onload="initMain()">
        <h2>Mes projets</h2>
        <div id="projects"></div>
        <a href="profile.html">Your profile</a>
        <button onclick="disconnect()">Logout</button>
    </body>
</html>
