<!DOCTYPE html>
<html>
    <body>
        <input id="password">
        <input id="confirm">

        <button onclick="update()">Update</button>

        <script>
        function update(){
            fetch("/api/users.py", {
                method: "POST",
                body: new URLSearchParams({
                    action: "update_password",
                    password: password.value
                })
            }).then(()=>location.href="signup.html");
        }
        </script>
    </body>
</html>
